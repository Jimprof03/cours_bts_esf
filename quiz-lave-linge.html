<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Le Lave-Linge | BTS ESF</title>
<style>
  :root {
    --navy: #0a1628; --navy2: #112240; --navy3: #1a3a5c;
    --gold: #c9a84c; --gold-light: #f0c96b;
    --white: #f0f4f8; --text: #ccd6f6; --text-dim: #8892b0;
    --green: #2ecc71; --red: #e74c3c;
    --green-bg: rgba(46,204,113,0.15); --red-bg: rgba(231,76,60,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  header { text-align: center; padding: 40px 20px 30px; border-bottom: 1px solid rgba(201,168,76,0.3); margin-bottom: 30px; }
  .subtitle { font-family: 'Trebuchet MS', sans-serif; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--white); font-weight: normal; }
  .meta { margin-top: 10px; font-family: 'Trebuchet MS', sans-serif; font-size: 0.85rem; color: var(--text-dim); }
  .progress-bar { background: var(--navy2); border-radius: 4px; height: 6px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-family: 'Trebuchet MS', sans-serif; font-size: 0.8rem; color: var(--text-dim); text-align: right; margin-bottom: 20px; }
  .question-card { background: var(--navy2); border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; padding: 28px; margin-bottom: 16px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .question-num { font-family: 'Trebuchet MS', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .question-text { font-size: 1.05rem; line-height: 1.6; color: var(--white); margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { background: var(--navy3); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 14px 18px; cursor: pointer; font-family: 'Trebuchet MS', sans-serif; font-size: 0.92rem; color: var(--text); text-align: left; transition: all 0.2s; }
  .option:hover:not(:disabled) { border-color: var(--gold); color: var(--white); background: rgba(201,168,76,0.1); }
  .option.correct { background: var(--green-bg); border-color: var(--green); color: #a8f5c9; }
  .option.wrong { background: var(--red-bg); border-color: var(--red); color: #f5b8b3; }
  .option:disabled { cursor: default; }
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-family: 'Trebuchet MS', sans-serif; font-size: 0.88rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; animation: fadeIn 0.2s ease; }
  .feedback.correct-fb { background: var(--green-bg); border-left: 3px solid var(--green); color: #a8f5c9; }
  .feedback.wrong-fb { background: var(--red-bg); border-left: 3px solid var(--red); color: #f5b8b3; }
  .nav { display: flex; justify-content: flex-end; margin-top: 20px; }
  .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 24px; border-radius: 6px; font-family: 'Trebuchet MS', sans-serif; font-size: 0.88rem; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: var(--gold); color: var(--navy); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary { background: var(--gold); color: var(--navy); font-weight: bold; }
  .score-panel { display: none; text-align: center; padding: 50px 20px; animation: fadeIn 0.5s ease; }
  .score-panel.show { display: block; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--navy2); }
  .score-number { font-size: 2.8rem; color: var(--gold-light); font-weight: bold; }
  .score-total { font-size: 0.85rem; color: var(--text-dim); font-family: 'Trebuchet MS', sans-serif; }
  .score-msg { font-size: 1.2rem; margin-bottom: 10px; color: var(--white); }
  .score-pct { font-family: 'Trebuchet MS', sans-serif; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 30px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="subtitle">BTS ESF — Cours 13</div>
    <h1>Le Lave-Linge</h1>
    <div class="meta">Quiz de révision · 20 questions · E2 Conseil & Expertise Technologiques</div>
  </header>
  <div id="quiz-area">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="progress-label" id="progress-label"></div>
    <div id="question-container"></div>
    <div class="nav"><button class="btn" id="btn-next" onclick="nextQuestion()" disabled>Question suivante →</button></div>
  </div>
  <div class="score-panel" id="score-panel">
    <div class="score-circle">
      <div class="score-number" id="score-num">0</div>
      <div class="score-total" id="score-tot">/ 20</div>
    </div>
    <div class="score-msg" id="score-msg"></div>
    <div class="score-pct" id="score-pct"></div>
    <button class="btn primary" style="padding:12px 32px;font-size:1rem" onclick="restart()">Recommencer le quiz</button>
  </div>
</div>
<script>
const questions = [
  { q: "Quelle est la capacité de chargement d'un lave-linge particulier ?", opts: ["1 à 5 kg","4 à 15 kg","10 à 30 kg","20 à 50 kg"], ans: 1, fb: "Un lave-linge domestique accepte entre 4 et 15 kg de linge. Les machines professionnelles vont de 10 à 30 kg." },
  { q: "Que risque-t-on si l'on surcharge le tambour ?", opts: ["Une surconsommation d'eau uniquement","Une déformation du tambour, des frottements et un blocage possible","Un cycle trop rapide","La lessive ne se dissout pas"], ans: 1, fb: "Surcharger le tambour peut provoquer sa déformation, des frottements excessifs et un blocage du programme." },
  { q: "Quelle est la fonction du verrouillage de la porte (étape 2) ?", opts: ["Empêcher l'entrée d'air froid","Autoriser le lancement du programme — sécurité pendant tout le cycle","Maintenir la pression intérieure","Mesurer le poids du linge"], ans: 1, fb: "La fermeture du hublot autorise le démarrage du programme. C'est une sécurité impérative pendant toute la durée du cycle." },
  { q: "Quel composant contrôle l'entrée d'eau dans le tambour lors du remplissage ?", opts: ["Le pressostat","La résistance","L'électrovanne","La pompe de vidange"], ans: 2, fb: "L'électrovanne contrôle l'arrivée d'eau dans le tambour. Elle s'ouvre et se ferme selon les besoins du programme." },
  { q: "Quel composant arrête le remplissage quand le niveau d'eau requis est atteint ?", opts: ["Le tachymètre","Le thermostat","La résistance","Le pressostat ou débitmètre"], ans: 3, fb: "Le pressostat (ou débitmètre selon les modèles) détecte le niveau d'eau et provoque l'arrêt automatique du remplissage." },
  { q: "Comment la chaleur est-elle produite dans le lave-linge ?", opts: ["Par friction du tambour","Par une résistance (thermoplongeur) qui chauffe l'eau","Par condensation de la vapeur","Par le moteur électrique"], ans: 1, fb: "La résistance (ou thermoplongeur) chauffe l'eau selon la température sélectionnée. La sonde ou thermostat régule cette température." },
  { q: "Comment le tambour est-il mis en rotation ?", opts: ["Par une turbine hydraulique","Par le moteur relié au tambour via une courroie","Par induction magnétique directe","Par la pression de l'eau"], ans: 1, fb: "Le moteur entraîne la rotation du tambour via une courroie. C'est l'élément moteur principal du lave-linge." },
  { q: "Quels sont les 3 composants de la vidange (étape 5) ?", opts: ["Moteur, courroie, tachymètre","Pressostat, électrovanne, résistance","Pompe, durite et tuyau d'évacuation","Filtre, bac à lessive, adoucissant"], ans: 2, fb: "La vidange repose sur trois éléments : la pompe de vidange, la durite et le tuyau d'évacuation." },
  { q: "À quel moment l'adoucissant est-il libéré dans le cycle ?", opts: ["Pendant le lavage principal","Au premier rinçage","Au dernier rinçage","Pendant l'essorage"], ans: 2, fb: "L'adoucissant est ajouté au dernier rinçage pour qu'il reste dans les fibres du linge." },
  { q: "Quel principe physique est utilisé lors de l'essorage ?", opts: ["L'osmose","La capillarité","La force centrifuge","La condensation"], ans: 2, fb: "L'essorage utilise la force centrifuge : le tambour tourne à grande vitesse, les vêtements sont plaqués contre la paroi et l'eau est expulsée." },
  { q: "Quel composant mesure la vitesse de rotation du tambour lors de l'essorage ?", opts: ["Le pressostat","La sonde thermique","Le tachymètre","L'électrovanne"], ans: 2, fb: "Le tachymètre mesure la vitesse de rotation du moteur et donc du tambour pendant l'essorage." },
  { q: "Que risque-t-on à forcer la porte du lave-linge avant le déverrouillage ?", opts: ["Une fuite d'eau","Casser la poignée","Un court-circuit","Un arrêt définitif du programme"], ans: 1, fb: "Ne jamais forcer la porte : on risque de casser la poignée. Il faut attendre le déverrouillage automatique ou appuyer sur Arrêt." },
  { q: "Quelle température est recommandée pour le linge délicat ou peu sale ?", opts: ["90°C","60°C","40°C","30°C"], ans: 3, fb: "30°C est recommandé pour le linge délicat ou moyennement sale : c'est économique et cela préserve les couleurs et les fibres." },
  { q: "Quelle température est conseillée pour le linge blanc et les taches tenaces ?", opts: ["30°C","40°C","60°C","90°C"], ans: 2, fb: "60°C convient pour le linge blanc et les taches tenaces. Il est efficace contre les salissures fortes." },
  { q: "Quel est le risque principal d'un lavage à 90°C ?", opts: ["Décoloration systématique","Rétrécissement des fibres","Débordement de mousse","Panne de la résistance"], ans: 1, fb: "Le lavage à 90°C est réservé à la désinfection mais comporte un risque de rétrécissement des fibres." },
  { q: "Pourquoi faut-il laver un vêtement neuf à la main avant son premier passage en machine ?", opts: ["Pour l'assouplir","Parce qu'il peut dégorger et teindre le reste du linge","Pour activer les fibres","Pour économiser de l'eau"], ans: 1, fb: "Un vêtement neuf peut dégorger lors du premier lavage et tacher les autres pièces. Il vaut mieux le laver à la main en premier." },
  { q: "Quel est le danger d'un surdosage de lessive moussante ?", opts: ["Le linge rétrécit","Débordement de mousse et linge rêche après séchage","La machine s'arrête automatiquement","La résistance surchauffe"], ans: 1, fb: "Trop de lessive moussante peut provoquer un débordement de mousse et laisser le linge rêche après séchage." },
  { q: "Pourquoi ne faut-il pas sécher du linge blanc au soleil ?", opts: ["Le soleil abîme les fibres synthétiques uniquement","Le soleil jaunit les vêtements blancs","Le soleil décolore toutes les couleurs","C'est interdit par les normes textiles"], ans: 1, fb: "Le soleil jaunit les vêtements blancs. Il vaut mieux les faire sécher à l'ombre ou dans un sèche-linge." },
  { q: "Comment entretenir le filtre de la pompe de vidange ?", opts: ["Le remplacer tous les ans","Débrancher l'appareil puis ouvrir régulièrement le bouchon en bas pour évacuer les résidus","Le nettoyer avec du vinaigre blanc directement","Lancer un cycle à vide à 90°C"], ans: 1, fb: "Il faut débrancher l'appareil, puis ouvrir le bouchon situé en bas de la machine pour évacuer les résidus. Prévoir une serpillière, il peut rester de l'eau." },
  { q: "Comment doit-on trier le linge avant le lavage ?", opts: ["Par poids uniquement","Par matière, par couleur (clairs/foncés) et selon les étiquettes de lavage","Par taille des pièces","Par niveau de saleté uniquement"], ans: 1, fb: "Le bon tri se fait selon trois critères : la matière (coton, synthétique, délicat, laine), la couleur (clairs avec clairs, foncés avec foncés) et les conseils des étiquettes." }
];

let current = 0, score = 0, answered = false, shuffled = [];

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function init() {
  shuffled = shuffle(questions); current = 0; score = 0; answered = false;
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('score-panel').classList.remove('show');
  renderQuestion();
}
function renderQuestion() {
  answered = false;
  document.getElementById('btn-next').disabled = true;
  const q = shuffled[current];
  document.getElementById('progress').style.width = (current/shuffled.length*100)+'%';
  document.getElementById('progress-label').textContent = `Question ${current+1} / ${shuffled.length}`;
  document.getElementById('question-container').innerHTML = `
    <div class="question-card">
      <div class="question-num">Question ${current+1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="option" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="feedback"></div>
    </div>`;
}
function answer(idx) {
  if (answered) return; answered = true;
  const q = shuffled[current];
  const btns = document.querySelectorAll('.option');
  btns.forEach(b=>b.disabled=true);
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if (idx!==q.ans) btns[q.ans].classList.add('correct');
  if (idx===q.ans) score++;
  const fb = document.getElementById('feedback');
  fb.textContent = (idx===q.ans?'✓ ':'✗ ')+q.fb;
  fb.className = 'feedback show '+(idx===q.ans?'correct-fb':'wrong-fb');
  document.getElementById('btn-next').disabled = false;
  if (current===shuffled.length-1) document.getElementById('btn-next').textContent = 'Voir mon score →';
}
function nextQuestion() { current++; current>=shuffled.length ? showScore() : renderQuestion(); }
function showScore() {
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('score-panel').classList.add('show');
  document.getElementById('score-num').textContent=score;
  document.getElementById('score-tot').textContent='/ '+shuffled.length;
  const pct=Math.round(score/shuffled.length*100);
  document.getElementById('score-pct').textContent=pct+'% de bonnes réponses';
  document.getElementById('score-msg').textContent=pct>=90?'🏆 Excellent ! Maîtrise complète du cours.':pct>=75?'👍 Bon résultat ! Quelques points à revoir.':pct>=60?'📖 Passable. Relire le cours s\'impose.':'⚠️ Des lacunes importantes à combler.';
}
function restart() { init(); }
init();
</script>
</body>
</html>
