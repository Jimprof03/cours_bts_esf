<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0C2340;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --green: #0F6E56;
    --green-light: #EAF3DE;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --gray: #5F5E5A;
    --gray-light: #F1EFE8;
    --border: #D3D1C7;
    --white: #FFFFFF;
    --text: #1C1C1C;
    --text-muted: #6B6A66;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F7F5F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    color: var(--text);
  }

  header {
    text-align: center;
    max-width: 680px;
    width: 100%;
    margin-bottom: 2rem;
  }

  .badge {
    display: inline-block;
    background: var(--blue-light);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
  }

  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border);
    max-width: 680px;
    width: 100%;
    padding: 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Progress */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--gray-light);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* Score strip */
  .score-strip {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .score-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 12px;
  }
  .pill-correct { background: var(--green-light); color: var(--green); }
  .pill-wrong   { background: var(--red-light);   color: var(--red);   }
  .pill-remain  { background: var(--gray-light);  color: var(--gray);  }

  /* Question */
  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--navy);
    line-height: 1.5;
    margin-bottom: 1.25rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    line-height: 1.45;
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: var(--blue-light);
    transform: translateX(3px);
  }
  .opt-btn:disabled { cursor: default; transform: none; }

  .opt-letter {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--gray-light);
    color: var(--gray);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    margin-top: 1px;
  }

  .opt-btn.correct { border-color: var(--green); background: var(--green-light); }
  .opt-btn.correct .opt-letter { background: var(--green); color: white; }

  .opt-btn.wrong { border-color: var(--red); background: var(--red-light); }
  .opt-btn.wrong .opt-letter { background: var(--red); color: white; }

  .opt-btn.reveal { border-color: var(--green); background: var(--green-light); }
  .opt-btn.reveal .opt-letter { background: var(--green); color: white; }

  /* Feedback */
  .feedback {
    margin-top: 1.25rem;
    padding: 1rem 1.1rem;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.fb-correct { background: var(--green-light); border-left: 3px solid var(--green); color: #0a4a3a; }
  .feedback.fb-wrong   { background: var(--amber-light); border-left: 3px solid var(--amber); color: #5a3a00; }
  .feedback-icon { font-weight: 600; margin-bottom: 4px; font-size: 13px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* Next button */
  .next-btn {
    margin-top: 1.25rem;
    padding: 0.65rem 1.4rem;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: none;
    transition: background 0.15s, transform 0.1s;
  }
  .next-btn:hover { background: var(--blue); transform: translateY(-1px); }
  .next-btn.show { display: inline-flex; align-items: center; gap: 6px; }

  /* Result screen */
  .result { text-align: center; padding: 1rem 0; animation: fadeIn 0.4s ease; }
  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 5rem;
    color: var(--navy);
    line-height: 1;
  }
  .result-denom { font-size: 1.5rem; color: var(--text-muted); font-family: 'DM Sans', sans-serif; }
  .result-pct {
    display: inline-block;
    margin: 0.5rem auto 1.5rem;
    font-size: 14px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;

  .result-msg {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 420px;
    margin: 0 auto 2rem;
    line-height: 1.6;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-box {
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .stat-num { font-size: 2rem; font-weight: 600; font-family: 'DM Serif Display', serif; }
  .stat-lbl { font-size: 12px; margin-top: 2px; }

  .restart-btn {
    padding: 0.7rem 2rem;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;

</head>

// Shuffle function (seeded-like with Math.random)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const LETTERS = ['a','b','c','d'];

// Build shuffled questions
const questions = DATA.map((item, i) => {
  const pool = shuffle([item.correct, ...item.wrong]);
  return {
    num: i + 1,
    q: item.q,
    opts: pool,
    a: pool.indexOf(item.correct),
    exp: item.exp
  };
});

    <div class="options">
      ${q.opts.map((o, i) => `
        <button class="opt-btn" onclick="pick(${i})">
          <span class="opt-letter">${LETTERS[i]}</span>
          <span>${o}</span>
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nb" onclick="next()">
      ${cur < questions.length - 1 ? 'Question suivante →' : 'Voir mes résultats →'}
    </button>
  `;
  answered = false;

  // Animate progress
  requestAnimationFrame(() => {
    const newPct = Math.round(((cur + 1) / questions.length) * 100);
    document.getElementById('pf').style.width = newPct + '%';
  });
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = questions[cur];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = i === q.a;
  if (isCorrect) {
    btns[i].classList.add('correct');
    score++;
  } else {
    btns[i].classList.add('wrong');
    btns[q.a].classList.add('reveal');
  }

  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (isCorrect ? 'fb-correct' : 'fb-wrong');
  fb.innerHTML = `<div class="feedback-icon">${isCorrect ? '✓ Bonne réponse !' : '✗ Pas tout à fait...'}</div>${q.exp}`;

  document.getElementById('nb').classList.add('show');
}

function next() {
  cur++;
  if (cur >= questions.length) showResult();
  else render();
}

function showResult() {
  const pct = Math.round((score / questions.length) * 100);
  let msg, color;
  if (pct >= 90) { msg = "Excellent ! Vous maîtrisez parfaitement ce cours."; color = "var(--green)"; }
  else if (pct >= 70) { msg = "Bien joué ! Quelques notions à consolider."; color = "var(--blue)"; }
  else if (pct >= 50) { msg = "Passable. Relisez les diapositives sur les parties manquées."; color = "var(--amber)"; }
  else { msg = "À retravailler. Reprenez le cours depuis le début."; color = "var(--red)"; }

  document.getElementById('quiz-area').innerHTML = `
    <div class="result">
      <div class="result-score">${score}<span class="result-denom">/${questions.length}</span></div>
      <div><span class="result-pct" style="background:${color}22;color:${color}">${pct}% de réussite</span></div>
      <p class="result-msg">${msg}</p>
      <div class="result-grid">
        <div class="stat-box" style="background:var(--green-light)">
          <div class="stat-num" style="color:var(--green)">${score}</div>
          <div class="stat-lbl" style="color:var(--green)">Bonnes réponses</div>
        </div>
        <div class="stat-box" style="background:var(--red-light)">
          <div class="stat-num" style="color:var(--red)">${questions.length - score}</div>
          <div class="stat-lbl" style="color:var(--red)">Erreurs</div>
        </div>
      </div>
      <button class="restart-btn" onclick="restart()">Recommencer le quiz</button>
    </div>
  `;
  document.getElementById('pf') && (document.getElementById('pf').style.width = '100%');
}

function restart() {
  cur = 0; score = 0;
  // Re-shuffle options for each question
  questions.forEach((item, i) => {
    const src = DATA[i];
    const pool = shuffle([src.correct, ...src.wrong]);
    item.opts = pool;
    item.a = pool.indexOf(src.correct);
  });
  render();
}

render();
</script>
</body>
</html>
