<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Quiz – L'eau BTS ESF</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0D1B2A; --blue: #1A3A5C; --teal: #1B6CA8;
    --accent: #E63946; --gold: #F4A261; --green: #2A9D8F;
    --gray: #8A9BB0; --white: #FFFFFF;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; padding: 0 20px 80px; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 80% 5%, #1B6CA822, transparent), radial-gradient(ellipse 40% 50% at 5% 90%, #2A9D8F15, transparent); pointer-events: none; z-index: 0; }
  .wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; }

  .header { padding: 44px 0 32px; }
  .header-tag { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 6px; }
  .header h1 span { color: var(--teal); }
  .header p { font-size: 14px; color: var(--gray); font-weight: 300; }

  .score-badge { display: inline-flex; align-items: center; gap: 8px; background: #ffffff10; border: 1px solid #ffffff20; border-radius: 100px; padding: 6px 16px; font-size: 14px; font-weight: 500; margin-bottom: 20px; }
  .score-badge span { color: var(--teal); font-weight: 700; }

  .progress-bar-wrap { background: #ffffff15; border-radius: 100px; height: 5px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--green)); border-radius: 100px; transition: width 0.4s ease; }
  .progress-text { font-size: 12px; color: var(--gray); display: flex; justify-content: space-between; margin-bottom: 32px; }

  .section-divider { display: flex; align-items: center; gap: 16px; margin: 32px 0 20px; }
  .section-divider-line { flex: 1; height: 1px; background: #ffffff15; }
  .section-divider-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }

  .question-card { background: #ffffff0A; border: 1px solid #ffffff15; border-radius: 14px; padding: 24px; margin-bottom: 16px; transition: border-color 0.3s; }
  .question-card.answered-correct { border-color: var(--green); background: #2A9D8F0D; }
  .question-card.answered-wrong { border-color: var(--accent); background: #E639460D; }

  .question-num { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 8px; }
  .section-tag { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }
  .tag-eau { background: #1B6CA820; color: var(--teal); border: 1px solid var(--teal); }
  .tag-usees { background: #2A9D8F20; color: var(--green); border: 1px solid var(--green); }
  .question-text { font-size: 15px; font-weight: 500; line-height: 1.55; margin-bottom: 16px; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 9px; border: 1.5px solid #ffffff20; background: #ffffff06; cursor: pointer; transition: all 0.15s; font-size: 14px; line-height: 1.45; color: var(--white); text-align: left; width: 100%; }
  .option:hover:not(:disabled) { border-color: var(--teal); background: #1B6CA815; }
  .option:disabled { cursor: default; }
  .option.selected-correct { border-color: var(--green); background: #2A9D8F20; color: #7ae8df; }
  .option.selected-wrong { border-color: var(--accent); background: #E6394620; color: #ff8a94; }
  .option.show-correct { border-color: var(--green); background: #2A9D8F15; color: #7ae8df; }
  .option-letter { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; min-width: 22px; height: 22px; border-radius: 5px; background: #ffffff15; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .option.selected-correct .option-letter { background: var(--green); color: white; }
  .option.selected-wrong .option-letter { background: var(--accent); color: white; }
  .option.show-correct .option-letter { background: var(--green); color: white; }

  .tf-options { display: flex; gap: 10px; }
  .tf-btn { flex: 1; padding: 12px; border-radius: 9px; border: 1.5px solid #ffffff20; background: #ffffff06; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--white); transition: all 0.15s; }
  .tf-btn:hover:not(:disabled) { border-color: var(--teal); background: #1B6CA815; }
  .tf-btn:disabled { cursor: default; }
  .tf-btn.selected-correct { border-color: var(--green); background: #2A9D8F20; color: #7ae8df; }
  .tf-btn.selected-wrong { border-color: var(--accent); background: #E6394620; color: #ff8a94; }
  .tf-btn.show-correct { border-color: var(--green); background: #2A9D8F15; color: #7ae8df; }

  .feedback { margin-top: 12px; padding: 11px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #2A9D8F20; border: 1px solid var(--green); color: #7ae8df; }
  .feedback.wrong { background: #E6394618; border: 1px solid var(--accent); color: #ff8a94; }

  .results { display: none; text-align: center; padding: 50px 32px; background: #ffffff08; border: 1px solid #ffffff15; border-radius: 18px; margin-top: 40px; }
  .results.show { display: block; }
  .results-score { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; margin: 12px 0 8px; color: var(--teal); }
  .results-label { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .results-sub { color: var(--gray); font-size: 14px; margin-bottom: 28px; }
  .results-breakdown { display: flex; justify-content: center; gap: 28px; margin-bottom: 32px; flex-wrap: wrap; }
  .breakdown-item { text-align: center; }
  .breakdown-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .breakdown-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
  .restart-btn { padding: 14px 36px; background: var(--teal); border: none; border-radius: 100px; color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: opacity 0.2s; }
  .restart-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-tag">BTS ESF · Habitat Logement Environnement</div>
    <h1>Quiz <span>L'eau</span></h1>
    <p>Adduction en eau potable · Traitement des eaux usées · 30 questions</p>
  </div>

  <div class="score-badge">Score : <span id="score-display">0</span> / <span id="total-display">30</span></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text"><span id="progress-label">0 réponse(s) donnée(s)</span><span id="progress-pct">0%</span></div>

  <div id="questions-container"></div>

  <div class="results" id="results">
    <div class="header-tag" style="color:var(--teal)">Résultats finaux</div>
    <div class="results-score" id="final-score"></div>
    <div class="results-label" id="final-label"></div>
    <div class="results-sub" id="final-sub"></div>
    <div class="results-breakdown">
      <div class="breakdown-item"><div class="breakdown-num" style="color:var(--green)" id="correct-count"></div><div class="breakdown-label">Correctes</div></div>
      <div class="breakdown-item"><div class="breakdown-num" style="color:var(--accent)" id="wrong-count"></div><div class="breakdown-label">Incorrectes</div></div>
    </div>
    <button class="restart-btn" onclick="restart()">Recommencer</button>
  </div>
</div>

<script>
const questions = [
  // ─── EAU POTABLE (15) ───────────────────────────────────────────────────
  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Qu'est-ce que l'eau potable ?",
    options: ["Une eau totalement pure et sans minéraux", "Une eau sans danger pour la santé, destinée à la consommation humaine", "Une eau uniquement utilisable pour l'hygiène", "Une eau traitée uniquement par ébullition"],
    answer: 1, explanation: "L'eau potable est destinée à la consommation humaine (boisson, cuisine, hygiène). Elle n'est pas forcément pure, mais elle est sans danger pour la santé." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Quels sont les 3 types de critères que doit respecter une eau potable ?",
    options: ["Physiques, chimiques et thermiques", "Microbiologiques, chimiques et organoleptiques", "Biologiques, minéraux et visuels", "Sanitaires, gustatifs et énergétiques"],
    answer: 1, explanation: "L'eau potable doit respecter des critères microbiologiques (absence de bactéries pathogènes), chimiques (nitrates, pesticides, métaux lourds) et organoleptiques (claire, sans odeur, sans mauvais goût)." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "tf",
    q: "Vrai ou Faux : L'eau potable est forcément une eau pure, sans aucun minéral.",
    answer: false, explanation: "Faux. L'eau potable n'est pas forcément pure — elle peut contenir des minéraux. Elle doit simplement être sans danger pour la santé." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Quel organisme est chargé du contrôle sanitaire de l'eau en France ?",
    options: ["La mairie", "L'Agence Régionale de Santé (ARS)", "La préfecture", "L'ANAH"],
    answer: 1, explanation: "Le contrôle sanitaire de l'eau est réalisé par l'ARS (Agence Régionale de Santé), qui suit plus de 60 paramètres. Les résultats sont publics et consultables en mairie ou en ligne." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Quelle est la valeur limite en nitrates dans l'eau potable ?",
    options: ["10 mg/L", "25 mg/L", "50 mg/L", "100 mg/L"],
    answer: 2, explanation: "La valeur limite réglementaire en nitrates est de 50 mg/L. Au-delà, l'eau n'est plus considérée comme potable." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Quel risque sanitaire les nitrates représentent-ils chez le nourrisson ?",
    options: ["Le saturnisme", "La méthémoglobinémie (syndrome du bébé bleu)", "L'eutrophisation", "La légionellose"],
    answer: 1, explanation: "Chez le nourrisson, un excès de nitrates peut provoquer la méthémoglobinémie, appelée aussi 'syndrome du bébé bleu', qui empêche le sang de transporter correctement l'oxygène." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "tf",
    q: "Vrai ou Faux : Les eaux souterraines (nappes phréatiques) sont totalement protégées des pollutions.",
    answer: false, explanation: "Faux. Les eaux souterraines sont mieux protégées que les eaux superficielles, mais elles restent sensibles aux pollutions diffuses comme les nitrates et les pesticides." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Quelle est la bonne ordre des étapes du traitement de l'eau en ville ?",
    options: ["Filtration → Désinfection → Dégrillage → Décantation", "Dégrillage → Décantation/floculation → Filtration → Désinfection", "Désinfection → Filtration → Dégrillage → Décantation", "Décantation → Dégrillage → Désinfection → Filtration"],
    answer: 1, explanation: "Les 4 étapes du traitement de l'eau potable sont : 1) Dégrillage (gros déchets), 2) Décantation/coagulation-floculation (matières en suspension), 3) Filtration (sable, charbon actif), 4) Désinfection (chlore, ozone, UV)." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Pourquoi le chlore est-il utilisé lors de la désinfection de l'eau ?",
    options: ["Pour améliorer le goût de l'eau", "Pour éliminer les nitrates", "Pour maintenir une désinfection résiduelle dans tout le réseau de distribution", "Pour adoucir l'eau calcaire"],
    answer: 2, explanation: "Le chlore est obligatoire car il maintient une désinfection résiduelle tout au long du réseau de canalisations, évitant toute recontamination jusqu'au robinet." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "En habitat isolé, quelle technique est la plus efficace pour dépolluer une eau (éliminer nitrates, métaux, pesticides) ?",
    options: ["L'ébullition", "L'UV (ultraviolet)", "L'osmose inverse", "Le charbon actif"],
    answer: 2, explanation: "L'osmose inverse est le système le plus efficace pour dépolluer l'eau car il retient nitrates, métaux, sels et pesticides. Une pompe force l'eau à traverser une membrane semi-perméable. Il est cependant très coûteux." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "tf",
    q: "Vrai ou Faux : La stérilisation par UV détruit les bactéries mais n'élimine pas les nitrates ni les métaux lourds.",
    answer: true, explanation: "Vrai. Les UV inactivent les micro-organismes (bactéries, virus) mais ne dépollent pas l'eau. Ils ne suppriment pas les nitrates, les métaux ou les pesticides." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "L'eau de pluie récupérée peut être utilisée pour :",
    options: ["La boisson et la cuisine uniquement", "Les WC, le lave-linge et le nettoyage (eau non potable)", "Tous les usages domestiques sans restriction", "L'arrosage uniquement"],
    answer: 1, explanation: "L'eau de pluie est une eau non potable (problèmes de micro-organismes). Elle peut être utilisée pour les WC, le lave-linge ou le nettoyage, nécessitant un double réseau dans la maison." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "Qu'est-ce que l'eau dure et quels sont ses effets ?",
    options: ["Eau contaminée bactériologiquement, cause des maladies", "Eau riche en calcium et magnésium, provoque des dépôts de tartre et une surconsommation énergétique", "Eau trop chlorée, mauvais goût", "Eau avec trop de nitrates, dangereuse pour les nourrissons"],
    answer: 1, explanation: "L'eau dure est riche en calcium et magnésium. Elle provoque des dépôts de tartre qui bouchent les canalisations, usent les appareils ménagers et peuvent augmenter la consommation énergétique jusqu'à +30%." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "tf",
    q: "Vrai ou Faux : Le compteur d'eau marque la frontière entre le réseau public et l'installation privée.",
    answer: true, explanation: "Vrai. Le compteur d'eau marque la séparation entre le réseau public (responsabilité de la collectivité) et l'installation privée intérieure (responsabilité du propriétaire)." },

  { section: "Adduction en eau potable", tag: "tag-eau", type: "qcm",
    q: "À quelle température faut-il régler le chauffe-eau pour limiter à la fois le tartre et le risque de légionnelles ?",
    options: ["45 °C", "50 °C", "55 °C", "70 °C"],
    answer: 2, explanation: "Le réglage à 55°C est recommandé car il permet de limiter les dépôts de tartre et de prévenir le développement des légionnelles (bactéries dangereuses qui prolifèrent entre 25 et 45°C)." },

  // ─── EAUX USÉES (15) ────────────────────────────────────────────────────
  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Comment appelle-t-on les eaux usées provenant de la cuisine et de la salle de bain ?",
    options: ["Eaux noires", "Eaux grises ou eaux ménagères", "Eaux pluviales", "Eaux de vannes"],
    answer: 1, explanation: "Les eaux grises (ou eaux ménagères) proviennent de la cuisine et de la salle de bain. Les eaux noires (ou eaux de vannes) proviennent des WC." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "tf",
    q: "Vrai ou Faux : Les eaux des WC sont principalement chargées en pollution microbiologique.",
    answer: true, explanation: "Vrai. Les eaux noires (WC) contiennent des matières fécales et de l'urine : leur pollution est principalement microbiologique, carbonée et azotée." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Quelle est la conséquence d'une mauvaise évacuation des eaux usées ?",
    options: ["Uniquement une mauvaise odeur", "Pollution des rivières et nappes, risques sanitaires et inondations", "Surconsommation d'eau potable", "Augmentation du tartre dans les canalisations"],
    answer: 1, explanation: "Une mauvaise évacuation des eaux usées provoque : la pollution des rivières et des nappes phréatiques, des risques sanitaires graves et des risques d'inondation." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Quelle est la différence entre un réseau unitaire et un réseau séparatif ?",
    options: ["Le réseau unitaire collecte uniquement les eaux usées, le séparatif collecte tout", "Le réseau unitaire collecte eaux usées et pluviales ensemble, le séparatif les sépare en deux canalisations distinctes", "Le réseau séparatif est plus simple et moins coûteux", "Il n'y a aucune différence pratique"],
    answer: 1, explanation: "Le réseau unitaire collecte eaux usées et eaux pluviales dans une seule canalisation (simple mais risque de surcharge). Le réseau séparatif utilise deux canalisations distinctes (plus efficace mais plus coûteux)." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Quelle est la bonne séquence de traitement dans une station d'épuration (STEP) ?",
    options: ["Traitement biologique → Dégrillage → Dessablage → Clarificateur", "Dégrillage → Dessablage/dégraissage → Traitement biologique → Clarificateur → Rejet", "Clarificateur → Traitement biologique → Dégrillage → Rejet", "Dessablage → Clarificateur → Dégrillage → Traitement biologique"],
    answer: 1, explanation: "La STEP fonctionne en 5 étapes : 1) Dégrillage, 2) Dessablage/dégraissage, 3) Traitement biologique (boues activées), 4) Clarificateur, 5) Traitement tertiaire (si nécessaire) puis rejet dans la rivière." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "tf",
    q: "Vrai ou Faux : Le traitement biologique en STEP utilise des bactéries pour dégrader les matières organiques.",
    answer: true, explanation: "Vrai. Le traitement secondaire (biologique) utilise des bactéries (boues activées) qui dégradent les matières organiques contenues dans les eaux usées." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Qui est responsable de la distribution d'eau potable et du traitement des eaux usées dans une commune ?",
    options: ["Le Préfet", "L'ARS", "Le Maire", "La Région"],
    answer: 2, explanation: "Le Maire est responsable de la distribution d'eau potable, de la collecte et du traitement des eaux usées de sa commune. Il peut déléguer ces missions à des entreprises privées (Veolia, Suez...)." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Que signifie ANC ?",
    options: ["Agence Nationale de Contrôle", "Assainissement Non Collectif", "Association pour les Nappes et Captages", "Autorisation de Nettoyage des Canalisations"],
    answer: 1, explanation: "ANC = Assainissement Non Collectif. C'est le système obligatoire pour les habitations isolées qui ne sont pas raccordées au réseau collectif d'assainissement." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Quel organisme contrôle les installations d'assainissement non collectif ?",
    options: ["L'ARS", "Le SPANC (Service Public d'Assainissement Non Collectif)", "La DDTM", "L'ANAH"],
    answer: 1, explanation: "Le SPANC (Service Public d'Assainissement Non Collectif) est chargé de contrôler les installations d'assainissement individuel et de s'assurer qu'elles sont conformes." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "tf",
    q: "Vrai ou Faux : La fosse toutes eaux doit obligatoirement être vidangée tous les 5 ans.",
    answer: true, explanation: "Vrai. La fosse toutes eaux doit être vidangée tous les 5 ans au maximum, avec vérification régulière du niveau de boues, pour garantir son bon fonctionnement." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Que se passe-t-il si on jette des lingettes ou des huiles dans les canalisations ?",
    options: ["Rien, elles sont traitées normalement en STEP", "Elles perturbent le fonctionnement de la station d'épuration", "Elles améliorent le traitement biologique", "Elles sont filtrées par le sol avant d'atteindre la STEP"],
    answer: 1, explanation: "Les lingettes, graisses et médicaments jetés dans les canalisations perturbent gravement le fonctionnement de la STEP. Il faut les jeter dans les poubelles ou points de collecte adaptés." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Quel est le prix moyen de l'eau en France en 2025 ?",
    options: ["1,50 €/m³", "2,90 €/m³", "4,69 €/m³", "7,20 €/m³"],
    answer: 2, explanation: "Le prix de l'eau en France est en moyenne de 4,69 €/m³ en 2025, ce qui représente une facture annuelle d'environ 520 € par ménage. Ce prix couvre prélèvement, traitement, distribution, assainissement et taxes." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "De quoi se compose principalement la facture d'eau ?",
    options: ["Uniquement du coût de l'eau potable", "Services eau potable (45%), assainissement (35%), taxes et redevances (20%)", "Distribution (80%) et taxes (20%)", "Traitement (60%) et distribution (40%)"],
    answer: 1, explanation: "La facture d'eau se décompose en : services de l'eau potable 45% (captage, traitement, distribution), assainissement 35% (collecte, dépollution), taxes et redevances 20% (TVA, agence de l'eau)." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "tf",
    q: "Vrai ou Faux : Les eaux pluviales et les eaux usées sont toujours collectées dans le même réseau.",
    answer: false, explanation: "Faux. Il existe deux types de réseaux : le réseau unitaire (collecte les deux ensemble) et le réseau séparatif (deux canalisations distinctes). Le séparatif est plus moderne et plus efficace." },

  { section: "Traitement des eaux usées", tag: "tag-usees", type: "qcm",
    q: "Quel est le rôle des Agences de l'eau ?",
    options: ["Distribuer l'eau potable aux ménages", "Réguler et suivre les rejets, collecter des redevances et informer le public", "Contrôler uniquement les stations d'épuration", "Gérer les puits et forages privés"],
    answer: 1, explanation: "Les Agences de l'eau ont 3 missions principales : réguler et suivre les rejets dans le milieu naturel, collecter des contributions financières des citoyens (redevances), et informer le public sur la gestion de l'eau." },
];

let score = 0, answered = 0, correctCount = 0, wrongCount = 0;

function buildQuiz() {
  const container = document.getElementById('questions-container');
  document.getElementById('total-display').textContent = questions.length;
  let lastSection = '';
  questions.forEach((q, i) => {
    if (q.section !== lastSection) {
      if (lastSection !== '') {
        const div = document.createElement('div');
        div.className = 'section-divider';
        div.innerHTML = `<div class="section-divider-line"></div><div class="section-divider-label">${q.section}</div><div class="section-divider-line"></div>`;
        container.appendChild(div);
      }
      lastSection = q.section;
    }
    container.appendChild(createCard(q, i));
  });
}

function createCard(q, i) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `card-${i}`;
  let inner = `<div class="section-tag ${q.tag}">${q.section}</div>
    <div class="question-num">Question ${i+1} / ${questions.length}</div>
    <div class="question-text">${q.q}</div>`;
  if (q.type === 'qcm') {
    inner += `<div class="options">`;
    q.options.forEach((opt, j) => {
      inner += `<button class="option" onclick="answerQCM(${i},${j})" id="opt-${i}-${j}"><span class="option-letter">${String.fromCharCode(65+j)}</span>${opt}</button>`;
    });
    inner += `</div>`;
  } else {
    inner += `<div class="tf-options">
      <button class="tf-btn" id="tf-${i}-true" onclick="answerTF(${i},true)">✓ Vrai</button>
      <button class="tf-btn" id="tf-${i}-false" onclick="answerTF(${i},false)">✗ Faux</button>
    </div>`;
  }
  inner += `<div class="feedback" id="feedback-${i}"></div>`;
  card.innerHTML = inner;
  return card;
}

function answerQCM(qi, selected) {
  const q = questions[qi];
  const card = document.getElementById(`card-${qi}`);
  const feedback = document.getElementById(`feedback-${qi}`);
  q.options.forEach((_, j) => {
    const btn = document.getElementById(`opt-${qi}-${j}`);
    btn.disabled = true;
    if (j === q.answer) btn.classList.add('show-correct');
    if (j === selected && selected !== q.answer) btn.classList.add('selected-wrong');
    if (j === selected && selected === q.answer) btn.classList.add('selected-correct');
  });
  const isCorrect = selected === q.answer;
  updateScore(isCorrect);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  feedback.textContent = (isCorrect ? '✓ ' : '✗ ') + q.explanation;
}

function answerTF(qi, selected) {
  const q = questions[qi];
  const card = document.getElementById(`card-${qi}`);
  const feedback = document.getElementById(`feedback-${qi}`);
  const trueBtn = document.getElementById(`tf-${qi}-true`);
  const falseBtn = document.getElementById(`tf-${qi}-false`);
  trueBtn.disabled = true; falseBtn.disabled = true;
  const isCorrect = selected === q.answer;
  if (q.answer) trueBtn.classList.add('show-correct'); else falseBtn.classList.add('show-correct');
  if (!isCorrect) (selected ? trueBtn : falseBtn).classList.add('selected-wrong');
  if (isCorrect) (selected ? trueBtn : falseBtn).classList.add('selected-correct');
  updateScore(isCorrect);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  feedback.textContent = (isCorrect ? '✓ ' : '✗ ') + q.explanation;
}

function updateScore(isCorrect) {
  answered++;
  if (isCorrect) { score++; correctCount++; } else { wrongCount++; }
  document.getElementById('score-display').textContent = score;
  const pct = Math.round(answered / questions.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} réponse(s) donnée(s)`;
  document.getElementById('progress-pct').textContent = pct + '%';
  if (answered === questions.length) setTimeout(showResults, 600);
}

function showResults() {
  const results = document.getElementById('results');
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('final-score').textContent = `${score}/${questions.length}`;
  document.getElementById('final-label').textContent = pct >= 80 ? '🏆 Excellent !' : pct >= 60 ? '👍 Bien !' : pct >= 40 ? '📚 À revoir' : '⚠️ À travailler';
  document.getElementById('final-sub').textContent = `Vous avez obtenu ${pct}% de bonnes réponses.`;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  results.classList.add('show');
  results.scrollIntoView({ behavior: 'smooth' });
}

function restart() {
  score = 0; answered = 0; correctCount = 0; wrongCount = 0;
  document.getElementById('score-display').textContent = 0;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-label').textContent = '0 réponse(s) donnée(s)';
  document.getElementById('progress-pct').textContent = '0%';
  document.getElementById('results').classList.remove('show');
  document.getElementById('questions-container').innerHTML = '';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
