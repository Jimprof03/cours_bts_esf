<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – L'adoucisseur d'eau BTS ESF</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy: #0D1B2A; --blue: #1B6CA8; --accent: #E63946; --gold: #F4A261; --green: #2A9D8F; --gray: #8A9BB0; --white: #FFFFFF; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; padding: 0 20px 80px; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 80% 5%, #1B6CA822, transparent), radial-gradient(ellipse 40% 50% at 5% 90%, #2A9D8F15, transparent); pointer-events: none; z-index: 0; }
  .wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; }
  .header { padding: 44px 0 32px; }
  .header-tag { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--blue); margin-bottom: 12px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 6px; }
  .header h1 span { color: var(--blue); }
  .header p { font-size: 14px; color: var(--gray); font-weight: 300; }
  .score-badge { display: inline-flex; align-items: center; gap: 8px; background: #ffffff10; border: 1px solid #ffffff20; border-radius: 100px; padding: 6px 16px; font-size: 14px; font-weight: 500; margin-bottom: 20px; }
  .score-badge span { color: var(--blue); font-weight: 700; }
  .progress-bar-wrap { background: #ffffff15; border-radius: 100px; height: 5px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 100px; transition: width 0.4s ease; }
  .progress-text { font-size: 12px; color: var(--gray); display: flex; justify-content: space-between; margin-bottom: 32px; }
  .section-divider { display: flex; align-items: center; gap: 16px; margin: 32px 0 20px; }
  .section-divider-line { flex: 1; height: 1px; background: #ffffff15; }
  .section-divider-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
  .question-card { background: #ffffff0A; border: 1px solid #ffffff15; border-radius: 14px; padding: 24px; margin-bottom: 16px; transition: border-color 0.3s; }
  .question-card.answered-correct { border-color: var(--green); background: #2A9D8F0D; }
  .question-card.answered-wrong { border-color: var(--accent); background: #E639460D; }
  .question-num { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 8px; }
  .section-tag { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }
  .tag-fonct { background: #1B6CA820; color: #7DBFE8; border: 1px solid var(--blue); }
  .tag-usage { background: #2A9D8F20; color: var(--green); border: 1px solid var(--green); }
  .tag-conseil { background: #F4A26120; color: var(--gold); border: 1px solid var(--gold); }
  .question-text { font-size: 15px; font-weight: 500; line-height: 1.55; margin-bottom: 16px; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 9px; border: 1.5px solid #ffffff20; background: #ffffff06; cursor: pointer; transition: all 0.15s; font-size: 14px; line-height: 1.45; color: var(--white); text-align: left; width: 100%; }
  .option:hover:not(:disabled) { border-color: var(--blue); background: #1B6CA815; }
  .option:disabled { cursor: default; }
  .option.selected-correct { border-color: var(--green); background: #2A9D8F20; color: #7ae8df; }
  .option.selected-wrong { border-color: var(--accent); background: #E6394620; color: #ff8a94; }
  .option.show-correct { border-color: var(--green); background: #2A9D8F15; color: #7ae8df; }
  .option-letter { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; min-width: 22px; height: 22px; border-radius: 5px; background: #ffffff15; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .option.selected-correct .option-letter { background: var(--green); color: white; }
  .option.selected-wrong .option-letter { background: var(--accent); color: white; }
  .option.show-correct .option-letter { background: var(--green); color: white; }
  .tf-options { display: flex; gap: 10px; }
  .tf-btn { flex: 1; padding: 12px; border-radius: 9px; border: 1.5px solid #ffffff20; background: #ffffff06; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--white); transition: all 0.15s; }
  .tf-btn:hover:not(:disabled) { border-color: var(--blue); background: #1B6CA815; }
  .tf-btn:disabled { cursor: default; }
  .tf-btn.selected-correct { border-color: var(--green); background: #2A9D8F20; color: #7ae8df; }
  .tf-btn.selected-wrong { border-color: var(--accent); background: #E6394620; color: #ff8a94; }
  .tf-btn.show-correct { border-color: var(--green); background: #2A9D8F15; color: #7ae8df; }
  .feedback { margin-top: 12px; padding: 11px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #2A9D8F20; border: 1px solid var(--green); color: #7ae8df; }
  .feedback.wrong { background: #E6394618; border: 1px solid var(--accent); color: #ff8a94; }
  .results { display: none; text-align: center; padding: 50px 32px; background: #ffffff08; border: 1px solid #ffffff15; border-radius: 18px; margin-top: 40px; }
  .results.show { display: block; }
  .results-score { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; margin: 12px 0 8px; color: var(--blue); }
  .results-label { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .results-sub { color: var(--gray); font-size: 14px; margin-bottom: 28px; }
  .results-breakdown { display: flex; justify-content: center; gap: 28px; margin-bottom: 32px; }
  .breakdown-item { text-align: center; }
  .breakdown-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .breakdown-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
  .restart-btn { padding: 14px 36px; background: var(--blue); border: none; border-radius: 100px; color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; }
  .restart-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-tag">BTS ESF · Habitat Logement Environnement</div>
    <h1>Quiz <span>L'adoucisseur d'eau</span></h1>
    <p>Fonctionnement · Usages · Publics fragiles · Conseil à l'usager · 15 questions</p>
  </div>
  <div class="score-badge">Score : <span id="score-display">0</span> / <span id="total-display">15</span></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text"><span id="progress-label">0 réponse(s) donnée(s)</span><span id="progress-pct">0%</span></div>
  <div id="questions-container"></div>
  <div class="results" id="results">
    <div class="header-tag" style="color:var(--blue)">Résultats finaux</div>
    <div class="results-score" id="final-score"></div>
    <div class="results-label" id="final-label"></div>
    <div class="results-sub" id="final-sub"></div>
    <div class="results-breakdown">
      <div class="breakdown-item"><div class="breakdown-num" style="color:var(--green)" id="correct-count"></div><div class="breakdown-label">Correctes</div></div>
      <div class="breakdown-item"><div class="breakdown-num" style="color:var(--accent)" id="wrong-count"></div><div class="breakdown-label">Incorrectes</div></div>
    </div>
    <button class="restart-btn" onclick="restart()">Recommencer</button>
  </div>
</div>
<script>
const questions = [
  // FONCTIONNEMENT (6)
  { section: "Fonctionnement", tag: "tag-fonct", type: "qcm",
    q: "Pourquoi dit-on qu'une eau est 'dure' ?",
    options: ["Elle contient trop de chlore", "Elle est riche en ions calcium et magnésium", "Elle est trop froide et difficile à chauffer", "Elle contient des bactéries"],
    answer: 1, explanation: "Une eau dure est une eau riche en ions calcium (Ca²⁺) et magnésium (Mg²⁺). Ces ions provoquent des dépôts de calcaire et l'entartrage des appareils." },

  { section: "Fonctionnement", tag: "tag-fonct", type: "qcm",
    q: "Par quel mécanisme fonctionne un adoucisseur d'eau ?",
    options: ["Par filtration des impuretés", "Par ébullition de l'eau", "Par échange d'ions : les ions calcium et magnésium sont remplacés par des ions sodium", "Par ajout de produits chimiques désinfectants"],
    answer: 2, explanation: "L'adoucisseur fonctionne par échange d'ions. La résine capte les ions calcium et magnésium (responsables du calcaire) et les remplace par des ions sodium (Na⁺). C'est un adoucissement chimique, pas une filtration." },

  { section: "Fonctionnement", tag: "tag-fonct", type: "tf",
    q: "Vrai ou Faux : L'adoucisseur d'eau filtre les bactéries et les polluants chimiques.",
    answer: false, explanation: "Faux. L'adoucisseur n'est pas un filtre. Il agit uniquement sur la dureté de l'eau en remplaçant le calcium et le magnésium par du sodium. Il ne supprime pas les bactéries ni les polluants." },

  { section: "Fonctionnement", tag: "tag-fonct", type: "qcm",
    q: "À quoi sert la régénération de la résine ?",
    options: ["À désinfecter l'eau adoucie", "À recharger la résine en ions sodium quand elle est saturée de calcium et magnésium", "À vider l'adoucisseur de l'eau sale", "À filtrer les impuretés accumulées"],
    answer: 1, explanation: "Avec le temps, la résine se sature en calcium et magnésium et ne peut plus fonctionner. La régénération consiste à rincer la résine avec de la saumure (eau + sel) pour la recharger en ions sodium." },

  { section: "Fonctionnement", tag: "tag-fonct", type: "tf",
    q: "Vrai ou Faux : Sans sel, l'adoucisseur continue à fonctionner normalement.",
    answer: false, explanation: "Faux. Sans sel, pas de régénération possible. La résine reste saturée et l'adoucisseur n'a plus aucun effet : l'eau en sortie est identique à l'eau d'entrée. Sans entretien, il y a aussi un risque de développement de biofilms." },

  { section: "Fonctionnement", tag: "tag-fonct", type: "qcm",
    q: "Que contient l'eau en sortie d'un adoucisseur par rapport à l'eau d'entrée ?",
    options: ["Moins de sodium, plus de calcium", "Moins de calcium et magnésium, plus de sodium", "Plus de chlore et moins de calcaire", "Aucune différence chimique"],
    answer: 1, explanation: "L'eau adoucie contient moins de calcium et de magnésium (moins de calcaire), mais plus de sodium. C'est ce sodium qui pose des problèmes pour certains publics fragiles." },

  // USAGES & LIMITES (5)
  { section: "Usages & Limites", tag: "tag-usage", type: "qcm",
    q: "Pour quels usages l'eau adoucie est-elle adaptée ?",
    options: ["La boisson, la cuisine et les biberons", "La douche, le lave-linge, le lave-vaisselle et le chauffe-eau", "Uniquement le lave-linge", "Tous les usages sans exception"],
    answer: 1, explanation: "L'eau adoucie convient pour la douche, le bain, le lave-linge, le lave-vaisselle et le chauffe-eau. Elle protège les appareils et les installations. En revanche, elle est déconseillée pour la boisson, la cuisine et la préparation des biberons." },

  { section: "Usages & Limites", tag: "tag-usage", type: "tf",
    q: "Vrai ou Faux : L'eau adoucie est meilleure pour la santé que l'eau du robinet ordinaire.",
    answer: false, explanation: "Faux. C'est l'erreur la plus fréquente ! L'adoucisseur protège le logement, pas la santé. Il modifie la composition de l'eau (moins de calcium, plus de sodium) ce qui peut même être problématique pour certains publics." },

  { section: "Usages & Limites", tag: "tag-usage", type: "qcm",
    q: "Pour quels publics la consommation d'eau adoucie est-elle particulièrement déconseillée ?",
    options: ["Les adultes en bonne santé", "Les nourrissons, les personnes suivant un régime sans sel, les personnes âgées fragiles et les patients cardio-vasculaires ou rénaux", "Uniquement les personnes âgées", "Les sportifs uniquement"],
    answer: 1, explanation: "L'eau adoucie est plus riche en sodium. Elle est donc déconseillée pour : les nourrissons (préparation des biberons), les personnes sous régime sans sel, les personnes âgées fragiles et celles atteintes de pathologies cardiovasculaires ou rénales." },

  { section: "Usages & Limites", tag: "tag-usage", type: "qcm",
    q: "Quel avantage concret apporte un adoucisseur dans la vie quotidienne ?",
    options: ["Il rend l'eau potable dans les zones polluées", "Il réduit le calcaire, protège les appareils, améliore le confort (linge, peau) et diminue la consommation de détergents", "Il filtre les microplastiques", "Il améliore le goût de l'eau pour la boisson"],
    answer: 1, explanation: "Les avantages concrets sont : réduction du calcaire, protection des appareils ménagers, allongement de leur durée de vie, moins de produits détergents nécessaires et meilleur confort (linge plus doux, peau moins irritée)." },

  { section: "Usages & Limites", tag: "tag-usage", type: "tf",
    q: "Vrai ou Faux : Un adoucisseur d'eau coûte environ 2 000 € pour une famille de 4 personnes.",
    answer: true, explanation: "Vrai. Le coût d'installation d'un adoucisseur est d'environ 2 000 € pour une famille de 4 personnes, sans compter l'entretien régulier (sel, régénération). C'est une limite importante à mentionner lors du conseil à l'usager." },

  // CONSEIL À L'USAGER (4)
  { section: "Conseil à l'usager (rôle ESF)", tag: "tag-conseil", type: "qcm",
    q: "Qu'est-ce qu'un by-pass et pourquoi est-il indispensable ?",
    options: ["Un système de filtration supplémentaire", "Un dispositif permettant de conserver un point d'eau non adoucie dans le logement", "Une valve de sécurité anti-débordement", "Un compteur de consommation de sel"],
    answer: 1, explanation: "Le by-pass est un dispositif qui permet de dériver l'eau sans passer par l'adoucisseur. Il est indispensable pour conserver au moins un point d'eau non adoucie (généralement à la cuisine) pour la boisson, la cuisine et les biberons." },

  { section: "Conseil à l'usager (rôle ESF)", tag: "tag-conseil", type: "qcm",
    q: "Quelle est l'erreur la plus fréquente des usagers avec un adoucisseur ?",
    options: ["Utiliser trop de sel", "Croire que l'eau adoucie est meilleure pour la santé et l'utiliser pour boire et préparer les biberons", "Faire trop souvent la régénération", "Ne pas installer l'adoucisseur assez près du chauffe-eau"],
    answer: 1, explanation: "L'erreur la plus fréquente est de croire que l'eau adoucie est meilleure pour la santé et de l'utiliser pour boire, cuisiner ou préparer des biberons. Le TESF doit clairement informer : l'adoucisseur protège le logement, pas la santé." },

  { section: "Conseil à l'usager (rôle ESF)", tag: "tag-conseil", type: "tf",
    q: "Vrai ou Faux : Le TESF doit adapter ses conseils sur l'adoucisseur en fonction du profil de l'usager (présence de nourrissons, pathologies...).",
    answer: true, explanation: "Vrai. Le rôle du TESF est d'informer, prévenir les risques et adapter les conseils aux publics. La présence de nourrissons, de personnes sous régime sans sel ou de patients fragilisés change radicalement les recommandations d'usage." },

  { section: "Conseil à l'usager (rôle ESF)", tag: "tag-conseil", type: "qcm",
    q: "Face à Mme Martin (bébé de 6 mois, régime sans sel), que lui conseillez-vous concernant l'adoucisseur ?",
    options: ["Utiliser l'eau adoucie pour tout sans restriction", "Installer un by-pass, ne jamais utiliser l'eau adoucie pour le biberon ou la cuisine, et conserver un robinet d'eau non adoucie", "Ne pas installer d'adoucisseur du tout car c'est trop dangereux", "Utiliser l'eau adoucie uniquement pour le bébé car c'est plus douce"],
    answer: 1, explanation: "Face à ce profil (nourrisson + régime sans sel), la solution est : installer un by-pass, conserver un point d'eau non adoucie pour la boisson, la cuisine et les biberons, et expliquer clairement que l'eau adoucie ne doit jamais être utilisée pour le bébé ou les personnes sous régime sans sel." },
];

let score = 0, answered = 0, correctCount = 0, wrongCount = 0;

function buildQuiz() {
  const container = document.getElementById('questions-container');
  document.getElementById('total-display').textContent = questions.length;
  let lastSection = '';
  questions.forEach((q, i) => {
    if (q.section !== lastSection) {
      if (lastSection !== '') {
        const div = document.createElement('div');
        div.className = 'section-divider';
        div.innerHTML = `<div class="section-divider-line"></div><div class="section-divider-label">${q.section}</div><div class="section-divider-line"></div>`;
        container.appendChild(div);
      }
      lastSection = q.section;
    }
    container.appendChild(createCard(q, i));
  });
}

function createCard(q, i) {
  const card = document.createElement('div');
  card.className = 'question-card'; card.id = `card-${i}`;
  let inner = `<div class="section-tag ${q.tag}">${q.section}</div>
    <div class="question-num">Question ${i+1} / ${questions.length}</div>
    <div class="question-text">${q.q}</div>`;
  if (q.type === 'qcm') {
    inner += `<div class="options">`;
    q.options.forEach((opt, j) => { inner += `<button class="option" onclick="answerQCM(${i},${j})" id="opt-${i}-${j}"><span class="option-letter">${String.fromCharCode(65+j)}</span>${opt}</button>`; });
    inner += `</div>`;
  } else {
    inner += `<div class="tf-options"><button class="tf-btn" id="tf-${i}-true" onclick="answerTF(${i},true)">✓ Vrai</button><button class="tf-btn" id="tf-${i}-false" onclick="answerTF(${i},false)">✗ Faux</button></div>`;
  }
  inner += `<div class="feedback" id="feedback-${i}"></div>`;
  card.innerHTML = inner; return card;
}

function answerQCM(qi, selected) {
  const q = questions[qi], card = document.getElementById(`card-${qi}`), feedback = document.getElementById(`feedback-${qi}`);
  q.options.forEach((_, j) => { const btn = document.getElementById(`opt-${qi}-${j}`); btn.disabled = true; if (j === q.answer) btn.classList.add('show-correct'); if (j === selected && selected !== q.answer) btn.classList.add('selected-wrong'); if (j === selected && selected === q.answer) btn.classList.add('selected-correct'); });
  const isCorrect = selected === q.answer; updateScore(isCorrect);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`; feedback.textContent = (isCorrect ? '✓ ' : '✗ ') + q.explanation;
}

function answerTF(qi, selected) {
  const q = questions[qi], card = document.getElementById(`card-${qi}`), feedback = document.getElementById(`feedback-${qi}`);
  const trueBtn = document.getElementById(`tf-${qi}-true`), falseBtn = document.getElementById(`tf-${qi}-false`);
  trueBtn.disabled = true; falseBtn.disabled = true;
  const isCorrect = selected === q.answer;
  if (q.answer) trueBtn.classList.add('show-correct'); else falseBtn.classList.add('show-correct');
  if (!isCorrect) (selected ? trueBtn : falseBtn).classList.add('selected-wrong');
  if (isCorrect) (selected ? trueBtn : falseBtn).classList.add('selected-correct');
  updateScore(isCorrect); card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`; feedback.textContent = (isCorrect ? '✓ ' : '✗ ') + q.explanation;
}

function updateScore(isCorrect) {
  answered++; if (isCorrect) { score++; correctCount++; } else { wrongCount++; }
  document.getElementById('score-display').textContent = score;
  const pct = Math.round(answered / questions.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} réponse(s) donnée(s)`;
  document.getElementById('progress-pct').textContent = pct + '%';
  if (answered === questions.length) setTimeout(showResults, 600);
}

function showResults() {
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('final-score').textContent = `${score}/${questions.length}`;
  document.getElementById('final-label').textContent = pct >= 80 ? '🏆 Excellent !' : pct >= 60 ? '👍 Bien !' : pct >= 40 ? '📚 À revoir' : '⚠️ À travailler';
  document.getElementById('final-sub').textContent = `Vous avez obtenu ${pct}% de bonnes réponses.`;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function restart() {
  score = 0; answered = 0; correctCount = 0; wrongCount = 0;
  document.getElementById('score-display').textContent = 0;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-label').textContent = '0 réponse(s) donnée(s)';
  document.getElementById('progress-pct').textContent = '0%';
  document.getElementById('results').classList.remove('show');
  document.getElementById('questions-container').innerHTML = '';
  buildQuiz(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
