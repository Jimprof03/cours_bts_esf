<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Les Plaques de Cuisson | BTS ESF</title>
<style>
  :root {
    --navy: #0a1628; --navy2: #112240; --navy3: #1a3a5c;
    --gold: #c9a84c; --gold-light: #f0c96b;
    --white: #f0f4f8; --text: #ccd6f6; --text-dim: #8892b0;
    --green: #2ecc71; --red: #e74c3c;
    --green-bg: rgba(46,204,113,0.15); --red-bg: rgba(231,76,60,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  header { text-align: center; padding: 40px 20px 30px; border-bottom: 1px solid rgba(201,168,76,0.3); margin-bottom: 30px; }
  .subtitle { font-family: 'Trebuchet MS', sans-serif; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--white); font-weight: normal; }
  .meta { margin-top: 10px; font-family: 'Trebuchet MS', sans-serif; font-size: 0.85rem; color: var(--text-dim); }
  .progress-bar { background: var(--navy2); border-radius: 4px; height: 6px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-family: 'Trebuchet MS', sans-serif; font-size: 0.8rem; color: var(--text-dim); text-align: right; margin-bottom: 20px; }
  .question-card { background: var(--navy2); border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; padding: 28px; margin-bottom: 16px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .question-num { font-family: 'Trebuchet MS', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .question-text { font-size: 1.05rem; line-height: 1.6; color: var(--white); margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { background: var(--navy3); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 14px 18px; cursor: pointer; font-family: 'Trebuchet MS', sans-serif; font-size: 0.92rem; color: var(--text); text-align: left; transition: all 0.2s; }
  .option:hover:not(:disabled) { border-color: var(--gold); color: var(--white); background: rgba(201,168,76,0.1); }
  .option.correct { background: var(--green-bg); border-color: var(--green); color: #a8f5c9; }
  .option.wrong { background: var(--red-bg); border-color: var(--red); color: #f5b8b3; }
  .option:disabled { cursor: default; }
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-family: 'Trebuchet MS', sans-serif; font-size: 0.88rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; animation: fadeIn 0.2s ease; }
  .feedback.correct-fb { background: var(--green-bg); border-left: 3px solid var(--green); color: #a8f5c9; }
  .feedback.wrong-fb { background: var(--red-bg); border-left: 3px solid var(--red); color: #f5b8b3; }
  .nav { display: flex; justify-content: flex-end; margin-top: 20px; }
  .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 24px; border-radius: 6px; font-family: 'Trebuchet MS', sans-serif; font-size: 0.88rem; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: var(--gold); color: var(--navy); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary { background: var(--gold); color: var(--navy); font-weight: bold; }
  .score-panel { display: none; text-align: center; padding: 50px 20px; animation: fadeIn 0.5s ease; }
  .score-panel.show { display: block; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--navy2); }
  .score-number { font-size: 2.8rem; color: var(--gold-light); font-weight: bold; }
  .score-total { font-size: 0.85rem; color: var(--text-dim); font-family: 'Trebuchet MS', sans-serif; }
  .score-msg { font-size: 1.2rem; margin-bottom: 10px; color: var(--white); }
  .score-pct { font-family: 'Trebuchet MS', sans-serif; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 30px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="subtitle">BTS ESF — Cours 10</div>
    <h1>Les Plaques de Cuisson</h1>
    <div class="meta">Quiz de révision · 20 questions · E2 Conseil & Expertise Technologiques</div>
  </header>
  <div id="quiz-area">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="progress-label" id="progress-label"></div>
    <div id="question-container"></div>
    <div class="nav"><button class="btn" id="btn-next" onclick="nextQuestion()" disabled>Question suivante →</button></div>
  </div>
  <div class="score-panel" id="score-panel">
    <div class="score-circle">
      <div class="score-number" id="score-num">0</div>
      <div class="score-total" id="score-tot">/ 20</div>
    </div>
    <div class="score-msg" id="score-msg"></div>
    <div class="score-pct" id="score-pct"></div>
    <button class="btn primary" style="padding:12px 32px;font-size:1rem" onclick="restart()">Recommencer le quiz</button>
  </div>
</div>
<script>
const questions = [
  // GAZ
  { q: "Quel composant mélange le gaz à l'air ambiant avant l'allumage sur une plaque à gaz ?", opts: ["Le robinet","Le thermostat","L'injecteur / gicleur","Le tuyau de raccordement"], ans: 2, fb: "À la sortie de l'injecteur (ou gicleur), le gaz se mélange naturellement à l'air ambiant avant d'être allumé." },
  { q: "Quel est le principal avantage d'une plaque à gaz selon les professionnels ?", opts: ["Elle ne consomme pas d'électricité","Le contrôle visuel direct de la flamme et la réactivité instantanée","Elle est la moins chère du marché","Elle ne nécessite aucun entretien"], ans: 1, fb: "Le contrôle visuel de la flamme permet de juger instantanément l'intensité de la chaleur. C'est pourquoi les professionnels la préfèrent." },
  { q: "Quel système de sécurité coupe automatiquement le gaz si la flamme s'éteint ?", opts: ["Le thermocouple","Le pressostat","Le détecteur de CO","Le régulateur de débit"], ans: 0, fb: "Le thermocouple (ou dispositif de sécurité gaz) détecte si la flamme est éteinte et coupe automatiquement l'alimentation en gaz." },
  { q: "Quel est l'inconvénient principal du nettoyage d'une plaque à gaz ?", opts: ["Elle se raye très facilement","Les grilles et brûleurs sont difficiles d'accès","Elle nécessite un produit chimique spécial","Elle doit être démontée entièrement"], ans: 1, fb: "Les grilles et brûleurs sont difficiles d'accès, ce qui rend le nettoyage d'une plaque à gaz plus contraignant qu'une vitrocéramique ou induction." },
  // ÉLECTRIQUE
  { q: "Comment la plaque électrique transmet-elle la chaleur aux aliments ?", opts: ["Par champ magnétique","Par rayonnement infrarouge","Par conduction : la résistance chauffe une plaque en fonte","Par convection d'air chaud"], ans: 2, fb: "La résistance électrique chauffe une plaque massive en fonte qui transmet ensuite la chaleur par conduction au récipient posé dessus." },
  { q: "Quel est le principal inconvénient de la plaque électrique en termes de sécurité ?", opts: ["Elle peut provoquer des étincelles","Elle n'a aucun système de sécurité : surchauffe et débordements ne sont pas détectés","Elle émet des radiations électromagnétiques dangereuses","Elle peut s'allumer seule"], ans: 1, fb: "La plaque électrique n'a aucun système de sécurité intégré : ni anti-surchauffe, ni anti-débordement, ni voyant de chaleur résiduelle." },
  { q: "Pour quel type d'usage la plaque électrique est-elle particulièrement adaptée ?", opts: ["Cuisine gastronomique professionnelle","Première installation, studio ou cuisson d'appoint","Famille nombreuse avec cuisson intensive","Remplacement d'une plaque à induction"], ans: 1, fb: "La plaque électrique, avec son prix de 150 à 300 €, est idéale pour une première installation, un studio ou un usage occasionnel d'appoint." },
  { q: "Pourquoi le nettoyage d'une plaque électrique est-il difficile ?", opts: ["La fonte est poreuse et absorbe les graisses","Les traces brûlées adhèrent fortement à la surface en fonte","La plaque doit être démontée avant nettoyage","Elle ne supporte pas l'eau"], ans: 1, fb: "Les projections alimentaires qui tombent sur la fonte brûlante carbonisent et adhèrent fortement, rendant le nettoyage difficile." },
  // VITROCÉRAMIQUE
  { q: "À quelle température maximale le verre d'une plaque vitrocéramique peut-il résister ?", opts: ["350°C","500°C","750°C","1000°C"], ans: 2, fb: "La vitre en verre noir des plaques vitrocéramiques est conçue pour résister à des températures allant jusqu'à 750°C." },
  { q: "Quelle est la différence principale entre un foyer radiant et un foyer halogène sur une plaque vitrocéramique ?", opts: ["Le foyer radiant est plus cher que l'halogène","Le foyer halogène chauffe instantanément (idéal pour saisir), le radiant diffuse une chaleur constante (idéal pour mijoter)","Le foyer radiant utilise des ampoules, le halogène des résistances","Ils sont identiques, seule la couleur diffère"], ans: 1, fb: "Le foyer halogène (ampoule tungstène) chauffe instantanément par infrarouge — idéal pour saisir. Le foyer radiant diffuse une chaleur douce et constante — idéal pour mijoter." },
  { q: "Combien de temps environ une plaque vitrocéramique reste-t-elle chaude après extinction ?", opts: ["5 minutes","Environ 30 minutes (jusqu'à moins de 60°C)","1 heure","Elle refroidit immédiatement"], ans: 1, fb: "Après extinction, la plaque vitrocéramique reste chaude environ 30 minutes. Le voyant de chaleur résiduelle reste allumé tant que la température dépasse 60°C." },
  { q: "Que fait le système anti-débordement d'une plaque vitrocéramique ?", opts: ["Il coupe l'alimentation électrique de toute la plaque","Il stoppe la diffusion de chaleur du foyer concerné quand un récipient déborde","Il émet une alarme sonore","Il augmente la puissance pour évaporer le liquide débordé"], ans: 1, fb: "Le système anti-débordement détecte qu'un récipient déborde et coupe la chaleur du foyer concerné pour éviter tout accident." },
  // INDUCTION
  { q: "Quel est le principe physique fondamental de la plaque à induction ?", opts: ["La résistance chauffe la plaque qui chauffe le récipient","Un champ magnétique généré par une bobine de cuivre crée des courants dans le récipient ferromagnétique qui se réchauffe","Des infrarouges chauffent directement les aliments","La conduction thermique entre la plaque et le récipient"], ans: 1, fb: "La bobine de cuivre génère un champ magnétique. Les électrons libres du récipient ferromagnétique se mettent en mouvement, créant un courant induit qui produit de la chaleur." },
  { q: "Pourquoi la plaque à induction est-elle considérée plus sûre que les autres ?", opts: ["Elle coupe automatiquement le gaz","Seul le récipient chauffe — la surface de la plaque reste froide","Elle est recouverte d'un verre anti-brûlure","Elle éteint automatiquement le feu après 30 minutes"], ans: 1, fb: "Seul le récipient (ferromagnétique) chauffe par induction. La plaque elle-même reste froide, ce qui réduit considérablement les risques de brûlure." },
  { q: "De combien la plaque à induction réduit-elle la consommation d'énergie par rapport à la vitrocéramique ?", opts: ["10%","20%","30%","50%"], ans: 2, fb: "La plaque à induction consomme environ 30% de moins qu'une plaque vitrocéramique, grâce à son rendement énergétique supérieur." },
  { q: "Quelle astuce simple permet de vérifier si un récipient est compatible avec l'induction ?", opts: ["Le plonger dans l'eau froide","Regarder s'il a un fond épais","Approcher un aimant : s'il adhère, le récipient est compatible","Vérifier son poids : plus de 500g = compatible"], ans: 2, fb: "Un aimant qui adhère au fond du récipient indique la présence de métal ferromagnétique — condition nécessaire pour fonctionner avec l'induction." },
  { q: "Quels matériaux de récipients sont INCOMPATIBLES avec la plaque à induction ?", opts: ["Fonte et acier inoxydable","Cuivre, verre et aluminium","Acier émaillé et fonte","Inox magnétique et fonte"], ans: 1, fb: "Le cuivre, le verre et l'aluminium ne sont pas ferromagnétiques : ils ne réagissent pas au champ magnétique et sont donc incompatibles avec l'induction." },
  // COMPARATIF
  { q: "Quelle plaque offre la meilleure performance en termes de vitesse de chauffe ?", opts: ["Gaz","Électrique","Vitrocéramique (halogène)","Induction"], ans: 3, fb: "L'induction est ultra-rapide : elle peut chauffer 4 litres d'eau en moins de 10 minutes grâce notamment à la fonction booster." },
  { q: "Quelle plaque recommanderiez-vous à un étudiant avec un budget limité en studio ?", opts: ["Induction (700–1500€)","Vitrocéramique (200–700€)","Plaque électrique (150–300€)","Gaz haut de gamme (1000€)"], ans: 2, fb: "La plaque électrique à 150–300€ est la solution la plus abordable, simple à installer (sans raccordement gaz) et adaptée à un usage en studio." },
  { q: "Quelle plaque recommanderiez-vous à un cuisinier passionné qui recherche précision et réactivité ?", opts: ["Électrique","Gaz","Vitrocéramique radiant","Induction"], ans: 3, fb: "L'induction offre des réglages ultra-précis, un passage instantané feu fort/feu doux, et une sécurité maximale — idéale pour un cuisinier exigeant." }
];

let current = 0, score = 0, answered = false, shuffled = [];

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function init() {
  shuffled = shuffle(questions); current = 0; score = 0; answered = false;
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('score-panel').classList.remove('show');
  renderQuestion();
}
function renderQuestion() {
  answered = false;
  document.getElementById('btn-next').disabled = true;
  const q = shuffled[current];
  document.getElementById('progress').style.width = (current/shuffled.length*100)+'%';
  document.getElementById('progress-label').textContent = `Question ${current+1} / ${shuffled.length}`;
  document.getElementById('question-container').innerHTML = `
    <div class="question-card">
      <div class="question-num">Question ${current+1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="option" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="feedback"></div>
    </div>`;
}
function answer(idx) {
  if (answered) return; answered = true;
  const q = shuffled[current];
  const btns = document.querySelectorAll('.option');
  btns.forEach(b=>b.disabled=true);
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if (idx!==q.ans) btns[q.ans].classList.add('correct');
  if (idx===q.ans) score++;
  const fb = document.getElementById('feedback');
  fb.textContent = (idx===q.ans?'✓ ':'✗ ')+q.fb;
  fb.className = 'feedback show '+(idx===q.ans?'correct-fb':'wrong-fb');
  document.getElementById('btn-next').disabled = false;
  if (current===shuffled.length-1) document.getElementById('btn-next').textContent = 'Voir mon score →';
}
function nextQuestion() { current++; current>=shuffled.length ? showScore() : renderQuestion(); }
function showScore() {
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('score-panel').classList.add('show');
  document.getElementById('score-num').textContent=score;
  document.getElementById('score-tot').textContent='/ '+shuffled.length;
  const pct=Math.round(score/shuffled.length*100);
  document.getElementById('score-pct').textContent=pct+'% de bonnes réponses';
  document.getElementById('score-msg').textContent=pct>=90?'🏆 Excellent ! Maîtrise complète du cours.':pct>=75?'👍 Bon résultat ! Quelques points à revoir.':pct>=60?'📖 Passable. Relire le cours s\'impose.':'⚠️ Des lacunes importantes à combler.';
}
function restart() { init(); }
init();
</script>
</body>
</html>
